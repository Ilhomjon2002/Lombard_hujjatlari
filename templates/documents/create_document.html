{% extends 'base.html' %}

{% block title %}Yangi Buyruq - HAT{% endblock %}
{% block header_title %}Yangi Buyruq Yaratish{% endblock %}

{% block extra_css %}
<style>
    .signature-preview {
        border: 1px solid #dee2e6;
        border-radius: 5px;
        padding: 10px;
        background: white;
        max-width: 300px;
        margin: 0 auto;
    }
    
    .selected-employee {
        background: #e8f4ff;
        border: 1px solid #c2e0ff;
        border-radius: 5px;
        padding: 8px 12px;
        margin: 5px;
        display: inline-flex;
        align-items: center;
    }
    
    .remove-employee {
        cursor: pointer;
        margin-left: 10px;
        color: #dc3545;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Buyruq ma'lumotlari</h5>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="documentForm">
                    {% csrf_token %}
                    
                    <!-- Basic Information -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="title" class="form-label">Sarlavha *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        <div class="col-md-6">
                            <label for="branch" class="form-label">Filial *</label>
                            <select class="form-control" id="branch" name="branch" required>
                                <option value="">Filialni tanlang</option>
                                {% for branch in branches %}
                                <option value="{{ branch.id }}">{{ branch.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <!-- Document Type and File -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="document_type" class="form-label">Hujjat turi *</label>
                            <select class="form-control" id="document_type" name="document_type" required disabled>
                                <option value="">Avval filialni tanlang</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="file" class="form-label">Fayl (PDF yoki DOCX) *</label>
                            <input type="file" class="form-control" id="file" name="file" accept=".pdf,.doc,.docx" required>
                        </div>
                    </div>
                    
                    <!-- Signature Settings -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="signature_type" class="form-label">Imzolash turi *</label>
                            <select class="form-control" id="signature_type" name="signature_type" required>
                                <option value="sequential">Ketma-ket imzolash</option>
                                <option value="parallel">Parallel imzolash</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="deadline" class="form-label">Muddati (ixtiyoriy)</label>
                            <input type="datetime-local" class="form-control" id="deadline" name="deadline">
                        </div>
                    </div>
                    
                    <!-- Employees Selection -->
                    <div class="row mb-3">
                        <div class="col-12">
                            <label class="form-label">Imzolovchi ishchilar *</label>
                            <div id="selectedEmployees" class="mb-2">
                                <!-- Selected employees will appear here -->
                            </div>
                            <select class="form-control" id="employeeSelect" disabled>
                                <option value="">Avval filialni tanlang</option>
                            </select>
                            <button type="button" class="btn btn-sm btn-primary mt-2" id="addEmployeeBtn" disabled>
                                <i class="fas fa-plus"></i> Ishchi qo'shish
                            </button>
                            <input type="hidden" name="employees" id="employeesInput">
                        </div>
                    </div>
                    
                    <!-- Employee Order (for sequential) -->
                    <div class="row mb-3" id="orderSection" style="display: none;">
                        <div class="col-12">
                            <label class="form-label">Imzolash tartibi</label>
                            <div id="employeeOrder">
                                <!-- Ordered list will appear here -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Saqlash
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        let selectedEmployees = [];
        let availableEmployees = [];
        
        // Load document types when branch is selected
        $('#branch').change(function() {
            const branchId = $(this).val();
            if (branchId) {
                // Load document types
                $.get(`/documents/api/document-types/?branch_id=${branchId}`, function(data) {
                    $('#document_type').empty().append('<option value="">Hujjat turini tanlang</option>');
                    data.document_types.forEach(function(type) {
                        $('#document_type').append(`<option value="${type.id}">${type.name}</option>`);
                    });
                    $('#document_type').prop('disabled', false);
                });
                
                // Load employees
                $.get(`/documents/api/branch-employees/?branch_id=${branchId}`, function(data) {
                    availableEmployees = data.employees;
                    $('#employeeSelect').empty().append('<option value="">Ishchini tanlang</option>');
                    data.employees.forEach(function(employee) {
                        $('#employeeSelect').append(
                            `<option value="${employee.id}">${employee.first_name} ${employee.last_name}</option>`
                        );
                    });
                    $('#employeeSelect').prop('disabled', false);
                    $('#addEmployeeBtn').prop('disabled', false);
                });
            } else {
                $('#document_type, #employeeSelect').prop('disabled', true);
                $('#addEmployeeBtn').prop('disabled', true);
            }
        });
        
        // Add employee to selected list
        $('#addEmployeeBtn').click(function() {
            const employeeId = $('#employeeSelect').val();
            if (employeeId && !selectedEmployees.includes(employeeId)) {
                const employee = availableEmployees.find(e => e.id == employeeId);
                if (employee) {
                    selectedEmployees.push(employeeId);
                    updateSelectedEmployees();
                    updateOrderSection();
                    updateEmployeesInput();
                }
            }
        });
        
        // Remove employee
        $(document).on('click', '.remove-employee', function() {
            const employeeId = $(this).data('id');
            selectedEmployees = selectedEmployees.filter(id => id != employeeId);
            updateSelectedEmployees();
            updateOrderSection();
            updateEmployeesInput();
        });
        
        // Update order (for sequential)
        $(document).on('click', '.move-up, .move-down', function() {
            const employeeId = $(this).data('id');
            const direction = $(this).hasClass('move-up') ? -1 : 1;
            const index = selectedEmployees.indexOf(employeeId);
            
            if ((direction === -1 && index > 0) || (direction === 1 && index < selectedEmployees.length - 1)) {
                const newIndex = index + direction;
                // Swap employees
                [selectedEmployees[index], selectedEmployees[newIndex]] = 
                [selectedEmployees[newIndex], selectedEmployees[index]];
                
                updateSelectedEmployees();
                updateOrderSection();
                updateEmployeesInput();
            }
        });
        
        // Show/hide order section based on signature type
        $('#signature_type').change(function() {
            updateOrderSection();
        });
        
        // Functions
        function updateSelectedEmployees() {
            const container = $('#selectedEmployees');
            container.empty();
            
            selectedEmployees.forEach(employeeId => {
                const employee = availableEmployees.find(e => e.id == employeeId);
                if (employee) {
                    container.append(`
                        <div class="selected-employee">
                            ${employee.first_name} ${employee.last_name}
                            <span class="remove-employee" data-id="${employeeId}">
                                <i class="fas fa-times"></i>
                            </span>
                        </div>
                    `);
                }
            });
        }
        
        function updateOrderSection() {
            const signatureType = $('#signature_type').val();
            const orderSection = $('#orderSection');
            const employeeOrder = $('#employeeOrder');
            
            if (signatureType === 'sequential' && selectedEmployees.length > 0) {
                orderSection.show();
                employeeOrder.empty();
                
                selectedEmployees.forEach((employeeId, index) => {
                    const employee = availableEmployees.find(e => e.id == employeeId);
                    if (employee) {
                        employeeOrder.append(`
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-primary me-2">${index + 1}</span>
                                <span class="flex-grow-1">${employee.first_name} ${employee.last_name}</span>
                                <div>
                                    <button type="button" class="btn btn-sm btn-outline-secondary move-up" data-id="${employeeId}" ${index === 0 ? 'disabled' : ''}>
                                        <i class="fas fa-arrow-up"></i>
                                    </button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary move-down" data-id="${employeeId}" ${index === selectedEmployees.length - 1 ? 'disabled' : ''}>
                                        <i class="fas fa-arrow-down"></i>
                                    </button>
                                </div>
                            </div>
                        `);
                    }
                });
            } else {
                orderSection.hide();
            }
        }
        
        function updateEmployeesInput() {
            $('#employeesInput').val(selectedEmployees.join(','));
        }
        
        // Form validation
        $('#documentForm').submit(function(e) {
            if (selectedEmployees.length === 0) {
                e.preventDefault();
                alert('Kamida bitta ishchini tanlashingiz kerak');
                return false;
            }
        });
    });
</script>
{% endblock %}

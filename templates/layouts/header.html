<header class="header-nav">
    <div class="d-flex align-items-center gap-3">
        <button class="nav-toggle" id="navToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="d-flex align-items-center bg-light rounded-pill px-3 py-2 d-none d-md-flex" style="border: 1px solid #e2e8f0;">
            <i class="fas fa-search text-muted me-2" style="font-size: 14px;"></i>
            <span class="text-muted" style="font-size: 14px; min-width: 200px;">Qidiruv...</span>
        </div>
    </div>

    <div class="d-flex align-items-center gap-2">
        <!-- Quick Actions -->
        <div class="d-flex align-items-center border-end pe-3 me-2 gap-1 d-none d-sm-flex">
            <button onclick="history.back()" class="btn btn-icon" title="Orqaga">
                <i class="fas fa-arrow-left text-secondary"></i>
            </button>
            <button onclick="location.reload()" class="btn btn-icon" title="Yangilash">
                <i class="fas fa-sync-alt text-secondary"></i>
            </button>
        </div>

        {% if user.is_authenticated %}
        <div class="dropdown">
            <button class="btn d-flex align-items-center gap-3 p-1 rounded-pill hover-bg" data-bs-toggle="dropdown" style="border: 1px solid #e2e8f0;">
                <div class="text-end d-none d-lg-block ps-2">
                    <div class="fw-bold" style="font-size: 13px; line-height: 1;">{{ user.get_full_name }}</div>
                    <div class="text-primary fw-medium" style="font-size: 11px; margin-top: 2px;">{{ user.get_role_display }}</div>
                </div>
                
                {% if user.profile_image %}
                    <img src="{{ user.profile_image.url }}" alt="Profile" class="rounded-circle" style="width: 38px; height: 38px; object-fit: cover; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0;">
                {% else %}
                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold" style="width: 38px; height: 38px; font-size: 14px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);">
                        {{ user.first_name|first }}{{ user.last_name|first }}
                    </div>
                {% endif %}
            </button>
            
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2 p-2" style="min-width: 200px; border-radius: 16px;">
                <li><a class="dropdown-item rounded-3 py-2" href="{% url 'profile' %}">
                    <i class="fas fa-user-circle me-2 text-primary"></i>Profil
                </a></li>
                <li><a class="dropdown-item rounded-3 py-2 d-flex align-items-center justify-content-between" href="{% url 'notifications' %}">
                    <span><i class="fas fa-bell me-2 text-warning"></i>Bildirishnomalar</span>
                    {% if user.unread_notifications_count > 0 %}
                    <span class="badge bg-danger rounded-pill" style="font-size: 10px;">{{ user.unread_notifications_count }}</span>
                    {% endif %}
                </a></li>
                <li><hr class="dropdown-divider my-2"></li>
                <li><a class="dropdown-item rounded-3 py-2 text-danger" href="{% url 'logout' %}">
                    <i class="fas fa-sign-out-alt me-2"></i>Chiqish
                </a></li>
            </ul>
        </div>
        {% endif %}
    </div>
</header>

<style>
    .btn-icon {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        padding: 0;
        transition: var(--transition);
    }
    .btn-icon:hover {
        background: #f1f5f9;
        transform: translateY(-1px);
    }
    .hover-bg:hover {
        background: #f8fafc;
    }
    .dropdown-item:active {
        background-color: var(--primary);
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const navToggle = document.getElementById('navToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        if(navToggle) {
            navToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
        }

        if(overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
    });
</script>
